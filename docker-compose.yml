services:
  api:
    build: .
    container_name: aegis_gateway_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - REDIS_HOST=redis_vault
    depends_on:
      - redis_vault
      - ollama_server
    networks:
      - aegis_net

  redis_vault:
    image: redis:7.2-alpine
    container_name: gateway_redis_vault
    command: redis-server --save "" --appendonly no
    networks:
      - aegis_net

  ollama_server:
    image: ollama/ollama
    container_name: gateway_llm
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aegis_net

networks:
  aegis_net:
    driver: bridge

volumes:
  ollama_data: